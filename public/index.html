<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaCyT - Gestión de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Navbar con simulador de Login/Rol -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1">Sistema de Eventos FaCyT</span>
            <div class="d-flex align-items-center gap-2">
                <label class="text-white small mb-0 fw-bold">Modo Usuario:</label>
                <select id="user-selector" class="form-select form-select-sm" style="width: auto;">
                    <option value='{"id": 101, "nombre": "Carlos (Estudiante)", "rol": "estudiante"}'>Carlos (Estudiante)</option>
                    <option value='{"id": 102, "nombre": "María (Organizador)", "rol": "organizador"}' selected>María (Organizador)</option>
                    <option value='{"id": 1, "nombre": "Admin FaCyT", "rol": "admin"}'>Admin FaCyT</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Dashboard / Resumen -->
        <div id="resumen-container" class="row mb-4">
            <!-- Se llena dinámicamente -->
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <ul class="nav nav-tabs card-header-tabs" id="myTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="btn-tab-eventos" data-bs-toggle="tab" data-bs-target="#tab-eventos">Eventos</button>
                    </li>
                    <!-- Oculto dinámicamente para estudiantes -->
                    <li class="nav-item" id="nav-item-nuevo">
                        <button class="nav-link" id="btn-tab-nuevo" data-bs-toggle="tab" data-bs-target="#tab-nuevo">Solicitar Evento</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-espacios">Espacios</button>
                    </li>
                </ul>
            </div>
            <div class="card-body tab-content">
                
                <!-- Lista de Eventos -->
                <div class="tab-pane fade show active" id="tab-eventos">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Evento</th>
                                <th>Fecha/Hora</th>
                                <th>Espacio</th>
                                <th>Estado</th>
                                <th>Asistentes</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-eventos"></tbody>
                    </table>
                </div>

                <!-- Formulario Nuevo Evento (Solo Organizador/Admin) -->
                <div class="tab-pane fade" id="tab-nuevo">
                    <form id="form-evento" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre del Evento</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Hora</label>
                            <input type="time" class="form-control" id="hora" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Espacio</label>
                            <select class="form-select" id="select-espacios" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Responsable</label>
                            <input type="text" class="form-control" id="responsable" placeholder="Dejar en blanco para usar tu nombre">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
                        </div>
                    </form>
                </div>

                <!-- Espacios -->
                <div class="tab-pane fade" id="tab-espacios">
                    <div id="lista-espacios" class="row"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Editar Evento -->
    <div class="modal fade" id="modalEditarEvento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <form id="form-editar-evento">
                    <div class="modal-body row g-3">
                        <input type="hidden" id="edit-id">
                        <div class="col-12">
                            <label class="form-label">Nombre del Evento</label>
                            <input type="text" class="form-control" id="edit-nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="edit-fecha" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hora</label>
                            <input type="time" class="form-control" id="edit-hora" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Espacio</label>
                            <select class="form-select" id="edit-select-espacios" required></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Responsable</label>
                            <input type="text" class="form-control" id="edit-responsable">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Rechazar Evento -->
    <div class="modal fade" id="modalRechazarEvento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">Rechazar Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <form id="form-rechazar-evento">
                    <div class="modal-body">
                        <input type="hidden" id="rechazar-id">
                        <p class="mb-3">¿Estás seguro de que deseas rechazar esta solicitud?</p>
                        <div class="mb-2">
                            <label for="rechazar-motivo" class="form-label fw-bold">Motivo o nota de rechazo (opcional):</label>
                            <textarea class="form-control" id="rechazar-motivo" rows="3" placeholder="Ej: El auditorio estará ocupado por mantenimiento técnico."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-danger">Confirmar Rechazo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
